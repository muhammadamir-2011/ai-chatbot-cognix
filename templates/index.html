<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognix AI — Aqlli suhbatdoshing</title>
<meta name="description" content="Cognix AI — tezkor, do'stona va aqlli AI suhbatdosh. Savol bering, gaplashing, yordam oling — hammasi bir joyda.">
<meta name="keywords" content="Cognix AI, Cognix, AI chatbot, sun'iy intellekt, o'zbek AI">
<meta property="og:title" content="Cognix AI">
<meta property="og:description" content="Cognix AI — aqlli, do'stona suhbatdosh. Hoziroq gaplashib ko'ring.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%230A0E14%22/><circle cx=%2250%22 cy=%2250%22 r=%2228%22 fill=%22none%22 stroke=%22%2300F0C0%22 stroke-width=%226%22/><circle cx=%2250%22 cy=%2250%22 r=%226%22 fill=%22%2300F0C0%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Cognix AI",
  "applicationCategory": "ChatApplication",
  "operatingSystem": "Web",
  "description": "Cognix AI — aqlli, do'stona AI suhbatdosh.",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
}
</script>
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo-orbit">
        <span class="logo-core"></span>
      </div>
      <div class="brand-text">
        <span class="brand-name">Cognix<span class="brand-accent">AI</span></span>
        <span class="brand-tag">aqlli suhbatdosh</span>
      </div>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      Onlayn
    </div>
  </header>

  <main class="chat-scroll" id="chatScroll">
    <div class="empty-state" id="emptyState">
      <div class="empty-glyph">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="17" stroke="currentColor" stroke-width="2" opacity="0.35"/>
          <circle cx="20" cy="20" r="4" fill="currentColor"/>
        </svg>
      </div>
      <div class="empty-title">Salom! Men Cognix AI 👋</div>
      <div class="empty-sub">Nima haqida gaplashamiz? Savol ber, men shu yerdaman.</div>
    </div>
  </main>

  <footer class="input-bar">
    <div class="input-inner">
      <textarea id="userInput" rows="1" placeholder="Cognix AI'ga xabar yoz..." aria-label="Xabar yozish maydoni"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Yuborish">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
    <div class="footer-hint">Cognix AI · Muhammad Amir Sobirov tomonidan yaratilgan</div>
  </footer>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
